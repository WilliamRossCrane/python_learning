<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calculator V2</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="header">
      <h2>Flask Calculator V2</h2>
      <p>Multiply numbers and save them to a database</p>
    </div>

    <ul>
      <li><a href="{{ url_for('main') }}">Home</a></li>
      <li><a href="{{ url_for('calculations') }}">Calculations</a></li>
    </ul>

    {% with messages = get_flashed_messages() %} {% if messages %}
    <div class="alert">
      {% for message in messages %}
      <p>{{ message }}</p>
      {% endfor %}
    </div>
    {% endif %} {% endwith %} {% block content %} {% endblock %}
  </body>
</html>
